<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>restaurant website using HTML and CSS</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header id="home">
        <div class="gold-shape"></div>

        <nav>
            <a href="" class="logo">
                <i class="fa-solid fa-utensils"></i>
                Breakfast
            </a>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#Recipe">Recipe</a></li>
                <li><a href="#food lover">food lover</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">contact</a></li>
            </ul>
            <div class="search">
                <input type="text" class="search__input" placeholder="search .......">
                <button class="search__button">
                    <svg class="search__icon" aria-hidden="true" viewBox="0 0 24 24">
                        <g>
                            <path
                                d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z">
                            </path>
                        </g>
                    </svg>
                </button>
            </div>
        </nav>
        <!---------------------------------hero section------------------------------------------->
        <section class="hero">
            <div class="hero-image">
                <img src="img.home.png" class="image" alt="food">
            </div>
            <div class="hero-content">
                <p class="pre-heading">Do You eat</p>
                <h1>Break fast</h1>
                <p class="sub-heading">Remember the days when you let your child have some chocolate if he finished his
                    cereal? now</p>
                <a href="#" class="btn-book">Book Now</a>
            </div>
            <div class="follow">
                <span>Follow Us</span>

                <div class="social-icons">
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-pinterest-p"></i></a>
                </div>
            </div>
            <a href="#Recipe" class="scroll-down">
                <i class="fa-solid fa-chevron-down"></i>
            </a>
        </section>

    </header>


    <!-------------------------------------------Recipe-------------------------------------------------------------->
    <section id="Recipe">



           <a href="#food lover" class="scroll-down">
                <i class="fa-solid fa-chevron-down"></i>
            </a>
    </section>

    <!---------------------------------------------food lover------------------------------------------------------------->
    <section id="food lover">
        
    </section>
    


</body>

</html>
